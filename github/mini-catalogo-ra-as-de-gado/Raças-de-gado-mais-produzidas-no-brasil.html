                <ul>
                    <li>O Nelore é a maior base genética do Brasil e a referência em pecuária a pasto. Sua aptidão reside na conversão alimentar em ambiente tropical, mantendo um excelente ganho de peso mesmo sob condições desafiadoras.</li>

                <h2 id="Angus">Angus</h2>

                <a href=angus.html>

                <figcaption><strong>Angus</strong></figcaption>
                </a>
                <ul>
                    <li>O Angus é reconhecido mundialmente pela qualidade superior de sua carne, caracterizada por marmoreio excepcional e sabor inigualável. Originária da Escócia, essa raça se adaptou perfeitamente ao clima brasileiro, tornando-se uma escolha popular entre os produtores de carne premium.</li>
                    <li>Carne de Alta Qualidade</li>                    
                </ul>
                </figure>

            <!--Brahman-->
            <section>
                <h2 id="Brahman">Brahman</h2>
                <figure>
                <a href=brahman.html>
                    <img src="https://images.tcdn.com.br/img/img_prod/774746/embaixador_da_amazonia_brahman_9943_1_f2d6e1f8d77e591d443be2c42dd9a5f5.jpg" alt="Brahman" width="400" height="400">
                    <figcaption>Brahman</figcaption>
                </a>
                <ul>
                    <li>O Brahman é uma raça de gado originária da Índia, conhecida por sua resistência ao calor e adaptabilidade a climas tropicais. No Brasil, o Brahman é valorizado por sua capacidade de prosperar em condições adversas, tornando-se uma escolha popular entre os pecuaristas que buscam eficiência produtiva em ambientes desafiadores.</li>
                    <li>Resistência ao Calor</li>    
                </figure>
            </section>

                </a>
                <ul>
                    <li>O Senepol é uma raça de gado originária das Ilhas Virgens, conhecida por sua adaptabilidade a climas quentes e resistência a parasitas. No Brasil, o Senepol tem ganhado popularidade entre os pecuaristas devido à sua capacidade de prosperar em condições tropicais, oferecendo uma alternativa eficiente para a produção de carne em regiões desafiadoras.</li>
                    <li>Adaptabilidade ao Clima Quente</li>    
                </figure>
            </section>

                    <li>Resistência a Doenças</li>
